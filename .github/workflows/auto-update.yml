name: Auto Update DNS Records

on:
  # 定时触发，每天运行一次
  schedule:
    - cron: '0 0 * * *'  # UTC 时间，对应北京时间 8:00
  # 手动触发
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 运行 Fission.py 脚本
      - name: Run Fission script
        run: python Fission.py

      # （可选）将更新后的结果提交回仓库
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dns_result.txt
          git add Fission_ip.txt
          git add Fission_domain.txt
          git commit -m 'Auto update DNS records' || echo "No changes to commit"
          git push || echo "No changes to push"
