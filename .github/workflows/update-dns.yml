name: Auto Update DNS Records

on:
  schedule:
    # 每周一 UTC 时间 0:00 执行（北京时间 8:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run DNS update script
        env:
          HUAWEI_ACCESS_KEY_ID: ${{ secrets.HUAWEI_ACCESS_KEY_ID }}
          HUAWEI_ACCESS_KEY_SECRET: ${{ secrets.HUAWEI_ACCESS_KEY_SECRET }}
        run: |
          python Fission.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Fission_ip.txt Fission_domain.txt dns_result.txt
          git diff --staged --quiet || git commit -m "Auto update DNS records [skip ci]"
          git push
